<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 {
            font-family: gabriola;
            font-size: 50px;
            text-align: center;
        }

        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(209, 235, 235);
            font-family: sans-serif;
        }

        .page {
            max-width: 500px;
            margin: 20px auto;
            background-color: white;
            border-radius: 20px;
            padding: 50px;
        }

        .boxes {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            ;
            flex-direction: column;

        }

        input {
            padding: 10px;
            margin: 10px;
        }

        .boxes div {
            background-color: aliceblue;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
        }

        .goto {
            text-align: center;
            font-weight: bold;
        }

        .change {
            font-family: forte;
            color: blue;
            font-size: 18px;
            cursor: pointer;
            background-color: transparent;
            border: 0;
        }

        .btn {
            margin-top: 10px;
            padding: 10px;
            width: 100px;
            border-radius: 20px;
            border: transparent;
            color: white;
            font-size: 28px;
            font-family: gabriola;
            background: linear-gradient(rgb(90, 218, 218), rgb(143, 139, 139));
        }

        .mess {
            color: red;
            font-size: 10px;
        }

        .animate {
            animation: oj 3s linear forwards;
            animation-delay: 2s;
        }

        @keyframes oj {
            to {
                opacity: 0
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <h1>Be a part of best bliss family🪄</h1>
        <div class="boxes">
            <div class="sign box">
                <form method='POST' onsubmit="ad(event)">
                    <label for="name">Name:</label>
                    <input type="text" name='name' id="name" placeholder="what would you like to be called?"><br>
                    <label for="gen">Gender:</label>
                    <input type="radio" name='gender' id="gen" value='Female'>Male
                    <input type="radio" name='gender' id="gen" value='Male'>Female
                    <input type="radio" name='gender' id="gen" value='Other'>Other<br>
                    <label for="mail">Email:</label>
                    <input type="email" name='mail' id="mail" placeholder="Email"><br>
                    <label for="username2">Mobile:</label>
                    <input type="text" id="username2" name='mob' placeholder="Mobile no."><br>
                    <label for="pass2">Password:</label>
                    <input type="pass" id="pass2" name='pass' placeholder="set a password"><br>
                    <p class="mess"></p>
                    <input type="submit" class="login btn" value="Register">
                </form>
                <p class="goto">Already have an account? <button onclick="window.location.href='/book'"
                        class="change">Login</button></p>
            </div>
        </div>
    </div>
</body>
<script>
    mess = document.querySelector('.mess');

    function ad(event) {
        event.preventDefault();
        mob = document.getElementById('username2').value
        mail = document.getElementById('mail').value
        pass = document.getElementById('pass2').value
        nam = document.getElementById('name').value
        let genderElem = document.querySelector('#gen:checked');
        let gender = genderElem ? genderElem.value : null;
        if  (!mob || !mail || !pass || !nam || !gender){
            mess.textContent='All fields are required';
            return false
        }
        if (mob.length != 10) {
            mess.textContent = 'Invalid mobile no.';
            return false
        }
        if (pass.length < 6) {
            mess.textContent = 'Password must be at least 6 characters long';
            return false
        }
        fetch('/add',
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 'mob': mob, 'mail': mail, 'gender': gender, 'pass': pass, 'name': nam }
                )
            }).then(x => x.json()).then((d) => {
                console.log(d['success'])
                if (d['success']) {
                    window.location.href = '/book';
                } else {
                    if (d['exist']) {
                        mess.textContent = 'This mobile number is already registered';
                    } else {
                        mess.textContent = d['exist'] || 'Registration failed. Please try again.'; // Show specific error if available
                    }
                }
                return false;
            })
    }
</script>

</html>
