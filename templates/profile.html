<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="bg-gray-100 min-h-screen relative">
    <button class='homebtn ml-10 p-4 bg-white rounded-lg absolute' onclick="window.location.href='/dashboard'">
        <i class="fa-solid fa-house"></i>
    </button>
    <!-- Profile Card -->

    <div class="max-w-4xl mx-auto mt-10 bg-white rounded-2xl shadow-lg overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-500 to-purple-600 h-40 relative">
            <img src="https://i.pravatar.cc/150"
                class="w-32 h-32 rounded-full border-4 border-white absolute left-1/2 transform -translate-x-1/2 top-20">
        </div>

        <!-- User Info -->
        <div class="mt-20 text-center px-6">
            <h2 class="text-2xl font-bold text-gray-800">{{t[4]}}</h2>
            <p class="text-gray-500">{{t[5]}}</p>

            <!-- Buttons -->
            <div class="flex justify-center gap-4 mt-4">
                <a href="/editprofile"
                    class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
                    Edit Profile
                </a>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-8 px-6">
            <div class="bg-gray-100 p-4 rounded-xl text-center">
                <h3 class="text-xl font-bold text-gray-800">{{t[7]}}</h3>
                <p class="text-gray-500 text-sm">Bookings</p>
            </div>
            <div class="bg-gray-100 p-4 rounded-xl text-center">
                <h3 class="text-xl font-bold text-gray-800">{{t[6]}}</h3>
                <p class="text-gray-500 text-sm">Reviews</p>
            </div>
        </div>

        <!-- Details Section -->
        <div class="mt-8 px-6 pb-8">
            <h3 class="text-lg font-semibold text-gray-700 mb-4">Personal Information</h3>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-sm text-gray-500">Phone</label>
                    <p class="font-medium text-gray-800">{{t[2]}}</p>
                </div>
                <div>
                    <label class="text-sm text-gray-500">Gender</label>
                    <p class="font-medium text-gray-800">{{t[1]}}</p>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
