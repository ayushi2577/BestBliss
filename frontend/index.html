            <a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>

          <div class="relative">

<!-- Floating Controls -->
<div class="fixed top-8 right-8 z-50 md:flex hidden items-center space-x-4">

  <button class="glass-panel p-3 rounded-full text-primary hover:scale-110 transition-transform">
    <span class="material-symbols-outlined">help_outline</span>

<script>
const API = 'https://bestbliss-0e4h.onrender.com/api/accounts';
// ─── Replace with your actual Google Client ID ───────────────────────────────
const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
// ─────────────────────────────────────────────────────────────────────────────

function saveTokens(access, refresh) {
  localStorage.setItem('access', access);
  localStorage.setItem('refresh', refresh);
}

// Already logged in → skip to dashboard
if (localStorage.getItem('access')) {
  window.location.href = 'dashboard.html';
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('login-success').classList.add('hidden');
}

function showSuccess(msg) {
  const el = document.getElementById('login-success');
  el.textContent = msg;
  el.classList.remove('hidden');
  document.getElementById('login-error').classList.add('hidden');
}

function togglePassword() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('visibility-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = 'visibility_off';
  } else {
    input.type = 'password';
    icon.textContent = 'visibility';
  }
}

// ── Email + Password Login ────────────────────────────────────────────────────
async function handleLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');

  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    // SimpleJWT's TokenObtainPairView expects { email, password }
    const res = await fetch(API + '/login/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showError(data.detail || 'Invalid credentials. Please try again.');
      return;
    }

    saveTokens(data.access, data.refresh);
    showSuccess('Welcome back! Redirecting…');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

  } catch (err) {
    showError('Network error. Please check your connection and try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// ── Google Sign-In ────────────────────────────────────────────────────────────
function handleGoogleSignIn() {
  const btn  = document.getElementById('google-btn');
  const text = document.getElementById('google-btn-text');
  btn.disabled = true;
  text.innerHTML = '<span class="spinner"></span> Connecting…';

  // Initialize Google Identity Services One-Tap / popup
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: onGoogleCredential,
    auto_select: false,
    cancel_on_tap_outside: true,
  });

  // Use the popup flow (works without a backend redirect)
  google.accounts.id.prompt((notification) => {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      // Fallback: render button in a hidden div and click it programmatically
      // Most browsers block the prompt on first visit — show OAuth popup instead
      openGooglePopup();
    }
  });

  // Reset button after 10 s if nothing happens
  setTimeout(() => {
    btn.disabled = false;
    text.textContent = 'Continue with Google';
  }, 10000);
}

function openGooglePopup() {
  // Render the hidden Google button and simulate a click
  const container = document.getElementById('g_id_container');
  google.accounts.id.renderButton(container, {
    theme: 'outline', size: 'large', type: 'standard'
  });
  const gBtn = container.querySelector('div[role="button"]');
  if (gBtn) gBtn.click();
}

// Called by GIS after the user picks a Google account
async function onGoogleCredential(response) {
  const btn  = document.getElementById('google-btn');
  const text = document.getElementById('google-btn-text');

  try {
    const res = await fetch(API + '/google/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: response.credential })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showError(data.error || 'Google authentication failed. Please try again.');
      return;
    }

    saveTokens(data.access, data.refresh);
    const msg = data.created ? 'Account created! Redirecting…' : 'Welcome back! Redirecting…';
    showSuccess(msg);
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);

  } catch (err) {
    showError('Network error during Google sign-in. Please try again.');
  } finally {
    btn.disabled = false;
    text.textContent = 'Continue with Google';
  }
}

// Hidden container for GIS button rendering fallback
document.addEventListener('DOMContentLoaded', () => {
  const el = document.createElement('div');
  el.id = 'g_id_container';
  el.style.cssText = 'position:absolute;opacity:0;pointer-events:none;';
  document.body.appendChild(el);

  // Enter key on password field triggers login
  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
});
</script>
