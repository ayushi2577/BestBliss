<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface/80 dark:bg-surface/80 backdrop-blur-md docked full-width top-0 sticky z-50 border-b border-white/10 flex justify-between items-center px-container-padding-mobile py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-white/10">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="person">person</span>
</div>
<span class="text-label-lg font-label-lg text-on-surface">Guest Profile</span>
</div>
<h1 class="text-headline-md font-headline-md tracking-tighter text-on-surface dark:text-on-surface font-black">BESTBLISS</h1>
<button class="text-primary transition-colors hover:text-primary/80">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content: Login Canvas -->
<main class="flex-grow flex items-center justify-center px-container-padding-mobile py-stack-lg bg-hero" data-alt="A luxurious hotel lobby at night viewed through a wide lens. The setting features soaring ceilings, grand marble columns, and opulent velvet lounge seating. Warm, golden ambient light glows from intricate chandeliers and recessed floor lighting, reflecting off polished surfaces. The atmosphere is quiet, exclusive, and serene, with a deep palette of charcoal, gold, and amber tones.">
<div class="w-full max-w-md glass-card rounded-xl p-8 flex flex-col space-y-stack-md">
<!-- Header section of the card -->
<div class="text-center space-y-2">
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">Welcome Back</h2>
<p class="text-label-sm font-label-sm text-on-surface-variant opacity-80">Experience the pinnacle of hospitality</p>
</div>
<!-- Login Form -->
<form class="space-y-stack-md pt-4">
<div class="space-y-2">
<label class="text-label-sm font-label-sm text-primary uppercase tracking-widest block" for="email">Email Address</label>
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary focus:ring-0 transition-colors py-3 text-on-surface placeholder:text-on-surface-variant/40" id="email" placeholder="concierge@bestbliss.com" type="email"/>
</div>
<div class="space-y-2">
<label class="text-label-sm font-label-sm text-primary uppercase tracking-widest block" for="password">Password</label>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant focus:border-primary focus:ring-0 transition-colors py-3 text-on-surface placeholder:text-on-surface-variant/40" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full bg-primary-container text-on-primary py-4 rounded-lg font-label-lg text-label-lg uppercase tracking-widest shadow-lg hover:opacity-90 active:scale-95 transition-all mt-4" type="submit">
                    Sign In
                </button>
</form>
<!-- Footer Links -->
<div class="pt-6 border-t border-white/10 text-center">
<p class="text-label-sm font-label-sm text-on-surface-variant mb-2">Not a member yet?</p>
<a class="text-label-lg font-label-lg text-primary hover:underline underline-offset-4 decoration-primary/40" href="#">Join BestBliss Rewards</a>
</div>
</div>
</main>

<footer class="mt-auto px-container-padding-mobile py-8 flex flex-col items-center justify-center space-y-4">

<span class="material-symbols-outlined text-on-surface-variant/40" data-icon="wine_bar">wine_bar</span>
